<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Hydraulic Jack | MechaMaster Group</title>

<link rel="icon" href="2.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="pageContent">

<header>
<nav>

<a href="index.html">Home</a> <a href="services.html">Services</a> <a href="contact.html">Contact</a>

</nav>
</header>

<section class="hero">

<h1>Hydraulic Jack</h1>

<p>Mechanical Lifting System</p>

<img
src="projects/hydraulic jack/55.jpeg"
class="cover-image"
onclick="openStrip()">

</section>

</div>

<div id="strip" class="image-strip">

<img src="projects/hydraulic jack/b.jpeg"
onclick="openViewer(this.src)">

<img src="projects/hydraulic jack/c.jpeg"
onclick="openViewer(this.src)">

<img src="projects/hydraulic jack/v.jpeg"
onclick="openViewer(this.src)">

<img src="projects/hydraulic jack/x.jpeg"
onclick="openViewer(this.src)">

</div>

<div
id="viewer"
class="image-viewer"
onclick="closeViewer()">

<div
class="viewer-box"
onclick="event.stopPropagation()">

<div
class="close-btn"
onclick="closeViewer()">

×

</div>

<img id="viewerImg">

<button
class="back-btn"
onclick="backToGallery()">

Back to Gallery

</button>

</div>

</div>

<script>

function openStrip(){

document.getElementById("strip").style.display="flex";

document.getElementById("pageContent")
.classList.add("blur-background");

}

function openViewer(src){

document.getElementById("strip").style.display="none";

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerImg").src=src;

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

document.getElementById("pageContent")
.classList.remove("blur-background");

}

function backToGallery(){

document.getElementById("viewer").style.display="none";

document.getElementById("strip").style.display="flex";

}

</script>

</body>

</html>
