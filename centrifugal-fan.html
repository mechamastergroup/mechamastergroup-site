<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Centrifugal Fan | MechaMaster Group</title>

<link rel="icon" href="looogo.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="pageContent">

<header>

<nav>

<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>

</nav>

</header>

<section class="hero">

<h1>Centrifugal Fan</h1>

<p>Industrial Fan Assembly</p>

<img
src="projects/centrifugal-fan/5e.jpg"
class="cover-image"
onclick="openStrip()">

</section>

</div>

<div id="strip" class="image-strip">

<img src="projects/centrifugal-fan/1a.jpeg"
onclick="openViewer(this.src)">

<img src="projects/centrifugal-fan/2b.jpeg"
onclick="openViewer(this.src)">

<img src="projects/centrifugal-fan/3c.jpeg"
onclick="openViewer(this.src)">

<img src="projects/centrifugal-fan/4d.jpeg"
onclick="openViewer(this.src)">

</div>

<div
id="viewer"
class="image-viewer"
onclick="closeViewer()">

<div
class="viewer-box"
onclick="event.stopPropagation()">

<div
class="close-btn"
onclick="closeViewer()">

×

</div>

<img id="viewerImg">

<button
class="back-btn"
onclick="backToGallery()">

Back to Gallery

</button>

</div>

</div>

<script>

function openStrip(){

document.getElementById("strip").style.display="flex";

document.getElementById("pageContent")
.classList.add("blur-background");

}

function openViewer(src){

document.getElementById("strip").style.display="none";

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerImg").src=src;

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

document.getElementById("strip").style.display="none";

document.getElementById("pageContent")
.classList.remove("blur-background");

}

function backToGallery(){

document.getElementById("viewer").style.display="none";

document.getElementById("strip").style.display="flex";

}

</script>
</body>

</html>
