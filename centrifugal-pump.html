<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">

<title>Centrifugal Pump | MechaMaster Group</title>

<link rel="icon" href="2.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">

<h1>Centrifugal Pump</h1>

<p>Mechanical Assembly Project</p>

<img src="projects/centrifugal-pump/5.jpg"
class="cover-image"
onclick="openGallery()">

</section>

<div id="galleryOverlay" class="gallery-overlay">

<div class="gallery-container" onclick="event.stopPropagation()">

<img src="projects/centrifugal-pump/1.jpeg"
class="gallery-thumb"
onclick="showLarge(this.src)">

<img src="projects/centrifugal-pump/2.jpeg"
class="gallery-thumb"
onclick="showLarge(this.src)">

<img src="projects/centrifugal-pump/3.jpeg"
class="gallery-thumb"
onclick="showLarge(this.src)">

<img src="projects/centrifugal-pump/4.jpeg"
class="gallery-thumb"
onclick="showLarge(this.src)">

</div>

</div>

<div id="imageOverlay" class="image-overlay"
onclick="closeLarge()">

<img id="largeImage">

</div>

<script>

function openGallery(){

document.getElementById("galleryOverlay").style.display="flex";

}

document.getElementById("galleryOverlay").onclick=function(){

this.style.display="none";

}

function showLarge(src){

document.getElementById("imageOverlay").style.display="flex";

document.getElementById("largeImage").src=src;

}

function closeLarge(){

document.getElementById("imageOverlay").style.display="none";

}

</script>

</body>

</html>
