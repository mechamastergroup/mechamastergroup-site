<script>

function openBanner(){

document.getElementById("socialBanner").style.display="block";

document.getElementById("pageContent")
.classList.add("blur-background");

}

function openSocial(){

document.getElementById("socialBanner").style.display="none";

document.getElementById("socialStrip").style.display="flex";

}

document.addEventListener("click", function(event){

const banner =
document.getElementById("socialBanner");

const strip =
document.getElementById("socialStrip");

if(
!event.target.closest("#socialBanner") &&
!event.target.closest("#socialStrip") &&
!event.target.closest("h2")
){

banner.style.display="none";

strip.style.display="none";

document.getElementById("pageContent")
.classList.remove("blur-background");

}

});

</script>
