<script>

function openModel(src){

document.getElementById("modelViewer").style.display = "flex";

document.getElementById("modelImage").src = src;

document.querySelector(".model-gallery")
.classList.add("blur-gallery");

}

function closeModel(){

document.getElementById("modelViewer").style.display = "none";

document.querySelector(".model-gallery")
.classList.remove("blur-gallery");

}

</script>
