<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Radial Engine | MechaMaster Group</title>

<link rel="icon" href="looogo.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="pageContent">

<header>

<nav>

<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="contact.html">Contact</a>

</nav>

</header>

<section class="hero">

<h1>Radial Engine</h1>

<p>Aircraft Engine Assembly</p>

<img
src="projects/radial-engine/4444.jpg"
class="cover-image"
onclick="openStrip()">

</section>

</div>

<div id="strip" class="image-strip">

<img src="projects/radial-engine/1111.jpeg"
onclick="openViewer(this.src)">

<img src="projects/radial-engine/2222.jpeg"
onclick="openViewer(this.src)">

<img src="projects/radial-engine/3333.jpg"
onclick="openViewer(this.src)">

</div>

<div
id="viewer"
class="image-viewer"
onclick="closeViewer()">

<div
class="viewer-box"
onclick="event.stopPropagation()">

<div
class="close-btn"
onclick="closeViewer()">

×

</div>

<img id="viewerImg">

<button
class="back-btn"
onclick="backToGallery()">

Back to Gallery

</button>

</div>

</div>

<script>

function openStrip(){

document.getElementById("strip").style.display="flex";

document.getElementById("pageContent")
.classList.add("blur-background");

}

function openViewer(src){

document.getElementById("strip").style.display="none";

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerImg").src=src;

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

document.getElementById("pageContent")
.classList.remove("blur-background");

}

function backToGallery(){

document.getElementById("viewer").style.display="none";

document.getElementById("strip").style.display="flex";

}

</script>

</body>

</html>
